name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Add permissions for the release job
permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # Don't cancel other builds if one fails
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary_name: horcrux.exe
            asset_name: horcrux-windows-x64.exe
          
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary_name: horcrux
            asset_name: horcrux-linux-x64
          
          - target: x86_64-apple-darwin
            os: macos-latest
            binary_name: horcrux
            asset_name: horcrux-macos-x64
          
          - target: aarch64-apple-darwin
            os: macos-latest
            binary_name: horcrux
            asset_name: horcrux-macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev musl-tools

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install openssl@3

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          OPENSSL_LIB_DIR: /usr/lib/x86_64-linux-gnu
          OPENSSL_INCLUDE_DIR: /usr/include/openssl

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.asset_name }}
          
          # Also copy README and LICENSE if they exist
          [ -f README.md ] && cp README.md dist/
          [ -f LICENSE ] && cp LICENSE dist/
          
          # Create archive
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cd dist && 7z a ../${{ matrix.asset_name }}.zip *
          else
            tar -czf ${{ matrix.asset_name }}.tar.gz -C dist .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            dist/${{ matrix.asset_name }}
            *.tar.gz
            *.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
